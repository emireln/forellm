# Build release binaries for Linux (musl) and macOS and attach them to GitHub Releases.
# Trigger: push a tag v* (e.g. git tag -a v0.6.9 -m "Release v0.6.9" && git push origin v0.6.9)
# install.sh expects: forellm-<TAG>-<PLATFORM>.tar.gz and optional .sha256

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  BINARY: forellm

jobs:
  build-linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install musl (x86_64)
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Build release
        run: cargo build --release -p forellm --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PLATFORM="x86_64-unknown-linux-musl"
          mkdir -p staging
          cp target/x86_64-unknown-linux-musl/release/$BINARY staging/
          tar czf "$BINARY-$TAG-$PLATFORM.tar.gz" -C staging $BINARY
          sha256sum "$BINARY-$TAG-$PLATFORM.tar.gz" > "$BINARY-$TAG-$PLATFORM.tar.gz.sha256"
          echo "ASSET=$BINARY-$TAG-$PLATFORM.tar.gz" >> $GITHUB_ENV
          echo "ASSET_SHA256=$BINARY-$TAG-$PLATFORM.tar.gz.sha256" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_SHA256 }}
          path: ${{ env.ASSET_SHA256 }}

  build-linux-aarch64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release (aarch64-unknown-linux-musl)
        run: cross build --target aarch64-unknown-linux-musl --release -p forellm

      - name: Package
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PLATFORM="aarch64-unknown-linux-musl"
          mkdir -p staging
          cp target/aarch64-unknown-linux-musl/release/$BINARY staging/
          tar czf "$BINARY-$TAG-$PLATFORM.tar.gz" -C staging $BINARY
          sha256sum "$BINARY-$TAG-$PLATFORM.tar.gz" > "$BINARY-$TAG-$PLATFORM.tar.gz.sha256"
          echo "ASSET=$BINARY-$TAG-$PLATFORM.tar.gz" >> $GITHUB_ENV
          echo "ASSET_SHA256=$BINARY-$TAG-$PLATFORM.tar.gz.sha256" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_SHA256 }}
          path: ${{ env.ASSET_SHA256 }}

  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-13
            target: x86_64-apple-darwin
            platform: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
            platform: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release -p forellm --target ${{ matrix.target }}

      - name: Package
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PLATFORM="${{ matrix.platform }}"
          mkdir -p staging
          cp target/${{ matrix.target }}/release/$BINARY staging/
          tar czf "$BINARY-$TAG-$PLATFORM.tar.gz" -C staging $BINARY
          shasum -a 256 "$BINARY-$TAG-$PLATFORM.tar.gz" > "$BINARY-$TAG-$PLATFORM.tar.gz.sha256"
          echo "ASSET=$BINARY-$TAG-$PLATFORM.tar.gz" >> $GITHUB_ENV
          echo "ASSET_SHA256=$BINARY-$TAG-$PLATFORM.tar.gz.sha256" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_SHA256 }}
          path: ${{ env.ASSET_SHA256 }}

  release:
    needs: [build-linux-x64, build-linux-aarch64, build-macos]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
