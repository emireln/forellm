<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <script>
    (function() {
      var t = localStorage.getItem('forellm-theme');
      if (t === 'light') document.documentElement.classList.remove('dark');
      else if (t === 'system') {
        document.documentElement.classList.toggle('dark', !window.matchMedia('(prefers-color-scheme: light)').matches);
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ForeLLM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="bg-zinc-950 text-zinc-200 font-sans antialiased overflow-hidden">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
